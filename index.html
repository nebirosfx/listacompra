<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lista de la compra</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fffef9;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 26px;
      color: #1a1a1a;
    }

    .ticket {
      padding: 2rem 2.4rem;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 2.4rem;
      padding-bottom: 2rem;
      border-bottom: 2px dashed #ccc;
    }

    .header-logo {
      font-size: 44px;
      letter-spacing: 8px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .header-sub {
      font-size: 20px;
      letter-spacing: 4px;
      color: #888;
      margin-top: 8px;
      text-transform: uppercase;
    }

    .meta {
      font-size: 20px;
      color: #999;
      text-align: center;
      margin-bottom: 2.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .store-block { margin: 0; }

    .store-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
    }

    .store-name {
      font-size: 22px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #555;
    }

    .store-total { font-size: 20px; color: #aaa; }

    .store-divider {
      border-top: 2px dashed #ccc;
      margin: 2.4rem 0;
    }

    table { width: 100%; border-collapse: collapse; }

    .th {
      font-size: 18px;
      color: #bbb;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8e4dc;
      font-weight: normal;
    }

    tr + tr td { border-top: 2px dotted #ece8e0; }
    td { padding: 14px 0; vertical-align: middle; }

    .col-qty   { width: 14%; color: #777; text-align: left; }
    .col-name  { width: 62%; }
    .col-price { width: 24%; color: #555; text-align: right; }

    th.col-qty   { text-align: left; }
    th.col-name  { text-align: left; }
    th.col-price { text-align: right; }

    .total-block {
      margin-top: 2.8rem;
      padding-top: 2rem;
      border-top: 2px dashed #ccc;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .total-label {
      font-size: 20px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #888;
    }

    .total-amount {
      font-size: 36px;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      font-size: 20px;
      color: #bbb;
      letter-spacing: 2px;
      line-height: 2;
      text-transform: uppercase;
      margin-top: 2.4rem;
      padding-top: 2rem;
      border-top: 2px dashed #ccc;
    }
  </style>
</head>
<body>
<div class="ticket" id="ticket">
  <div class="header">
    <div class="header-logo">🛒 Compra Lope</div>
    <div class="header-sub">lista semanal</div>
  </div>
  <div class="meta" id="fecha"></div>
  <div id="contenido"></div>
  <div class="total-block">
    <span class="total-label">Total estimado</span>
    <span class="total-amount" id="total"></span>
  </div>
  <div class="footer" id="footer"></div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzV4kKrs4VzR5Q5JCEnMMHCRE23WlzFozxdKpVnv80_YTuyQ6eZRIksexvQ9SGgSVW7/exec';

  const now = new Date();
  document.getElementById('fecha').textContent = now.toLocaleDateString('es-ES', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  }).toUpperCase();

  function cargarJSONP(url) {
    return new Promise((resolve, reject) => {
      const nombre = 'jsonp_' + Date.now();
      const script = document.createElement('script');
      window[nombre] = data => {
        delete window[nombre];
        document.body.removeChild(script);
        resolve(data);
      };
      script.onerror = () => reject(new Error('Error cargando datos'));
      script.src = url + '?callback=' + nombre;
      document.body.appendChild(script);
    });
  }

  function renderizar(items) {
    const groups = {};
    items.forEach(item => {
      const store = item.store || 'Sin supermercado';
      if (!groups[store]) groups[store] = [];
      groups[store].push(item);
    });

    const totalGlobal = items.reduce((sum, item) => {
      const p = parseFloat(item.price.replace(',', '.')) || 0;
      const q = parseFloat(item.qty.replace(',', '.')) || 1;
      return sum + p * q;
    }, 0);

    const blocks = Object.entries(groups).map(([store, storeItems], i, arr) => {
      const storeTotal = storeItems.reduce((sum, item) => {
        const p = parseFloat(item.price.replace(',', '.')) || 0;
        const q = parseFloat(item.qty.replace(',', '.')) || 1;
        return sum + p * q;
      }, 0);

      const rows = storeItems.map(item => {
        const p = parseFloat(item.price.replace(',', '.')) || 0;
        const priceStr = p > 0 ? p.toFixed(2) + '€' : '—';
        return `<tr>
          <td class="col-qty">${item.qty || '—'}</td>
          <td class="col-name">${item.name}</td>
          <td class="col-price">${priceStr}</td>
        </tr>`;
      }).join('');

      const divider = i < arr.length - 1 ? '<div class="store-divider"></div>' : '';

      return `
        <div class="store-block">
          <div class="store-header">
            <span class="store-name">${store}</span>
            <span class="store-total">${storeTotal.toFixed(2)}€</span>
          </div>
          <table>
            <thead><tr>
              <th class="col-qty th">Ud.</th>
              <th class="col-name th">Producto</th>
              <th class="col-price th">Precio</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>${divider}`;
    }).join('');

    document.getElementById('contenido').innerHTML = blocks;
    document.getElementById('total').textContent = totalGlobal.toFixed(2) + '€';
    document.getElementById('footer').innerHTML =
      items.length + ' producto' + (items.length !== 1 ? 's' : '') +
      ' · ' + Object.keys(groups).length + ' supermercado' +
      (Object.keys(groups).length !== 1 ? 's' : '') +
      '<br>¡Buena compra!';
  }

  cargarJSONP(SCRIPT_URL)
    .then(renderizar)
    .catch(err => {
      document.getElementById('contenido').innerHTML =
        '<p style="color:red;padding:1rem;">Error: ' + err.message + '</p>';
    });
</script>
</body>
</html>

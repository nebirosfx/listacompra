<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lista de la compra</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fffef9;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 13px;
      color: #1a1a1a;
    }

    .ticket {
      padding: 1rem 1.2rem;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 1.2rem;
      padding-bottom: 1rem;
      border-bottom: 1px dashed #ccc;
    }

    .header-logo {
      font-size: 22px;
      letter-spacing: 4px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .header-sub {
      font-size: 10px;
      letter-spacing: 2px;
      color: #888;
      margin-top: 4px;
      text-transform: uppercase;
    }

    .meta {
      font-size: 10px;
      color: #999;
      text-align: center;
      margin-bottom: 1.4rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .store-block { margin: 0; }

    .store-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .store-name {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
    }

    .store-total { font-size: 10px; color: #aaa; }

    .store-divider {
      border-top: 1px dashed #ccc;
      margin: 1.2rem 0;
    }

    table { width: 100%; border-collapse: collapse; }

    .th {
      font-size: 9px;
      color: #bbb;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding-bottom: 5px;
      border-bottom: 1px solid #e8e4dc;
      font-weight: normal;
    }

    tr + tr td { border-top: 1px dotted #ece8e0; }
    td { padding: 7px 0; vertical-align: middle; }

    .col-qty   { width: 14%; color: #777; text-align: left; }
    .col-name  { width: 62%; }
    .col-price { width: 24%; color: #555; text-align: right; }

    th.col-qty   { text-align: left; }
    th.col-name  { text-align: left; }
    th.col-price { text-align: right; }

    .total-block {
      margin-top: 1.4rem;
      padding-top: 1rem;
      border-top: 1px dashed #ccc;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .total-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
    }

    .total-amount {
      font-size: 18px;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: #bbb;
      letter-spacing: 1px;
      line-height: 2;
      text-transform: uppercase;
      margin-top: 1.2rem;
      padding-top: 1rem;
      border-top: 1px dashed #ccc;
    }
  </style>
</head>
<body>
<div class="ticket" id="ticket">
  <div class="header">
    <div class="header-logo">🛒 Compra Lope</div>
    <div class="header-sub">lista semanal</div>
  </div>
  <div class="meta" id="fecha"></div>
  <div id="contenido"></div>
  <div class="total-block">
    <span class="total-label">Total estimado</span>
    <span class="total-amount" id="total"></span>
  </div>
  <div class="footer" id="footer"></div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYcpLjnOJB36IN5xDrheiY_6Z86AsFMVunN3zvk_xXEO1Tzu8Mp3XXJSPqGM4bmz0g/exec';

  const now = new Date();
  document.getElementById('fecha').textContent = now.toLocaleDateString('es-ES', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  }).toUpperCase();

  fetch(SCRIPT_URL)
    .then(r => r.json())
    .then(items => {
      const groups = {};
      items.forEach(item => {
        const store = item.store || 'Sin supermercado';
        if (!groups[store]) groups[store] = [];
        groups[store].push(item);
      });

      const totalGlobal = items.reduce((sum, item) => {
        const p = parseFloat(String(item.price).replace(',', '.')) || 0;
        const q = parseFloat(String(item.qty).replace(',', '.')) || 1;
        return sum + p * q;
      }, 0);

      const blocks = Object.entries(groups).map(([store, storeItems], i, arr) => {
        const storeTotal = storeItems.reduce((sum, item) => {
          const p = parseFloat(String(item.price).replace(',', '.')) || 0;
          const q = parseFloat(String(item.qty).replace(',', '.')) || 1;
          return sum + p * q;
        }, 0);

        const rows = storeItems.map(item => {
          const p = parseFloat(String(item.price).replace(',', '.')) || 0;
          const priceStr = p > 0 ? p.toFixed(2) + '€' : '—';
          return `<tr>
            <td class="col-qty">${item.qty !== '' ? item.qty : '—'}</td>
            <td class="col-name">${item.name}</td>
            <td class="col-price">${priceStr}</td>
          </tr>`;
        }).join('');

        const divider = i < arr.length - 1 ? '<div class="store-divider"></div>' : '';

        return `
          <div class="store-block">
            <div class="store-header">
              <span class="store-name">${store}</span>
              <span class="store-total">${storeTotal.toFixed(2)}€</span>
            </div>
            <table>
              <thead><tr>
                <th class="col-qty th">Ud.</th>
                <th class="col-name th">Producto</th>
                <th class="col-price th">Precio</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>${divider}`;
      }).join('');

      document.getElementById('contenido').innerHTML = blocks;
      document.getElementById('total').textContent = totalGlobal.toFixed(2) + '€';
      document.getElementById('footer').innerHTML =
        items.length + ' producto' + (items.length !== 1 ? 's' : '') +
        ' · ' + Object.keys(groups).length + ' supermercado' +
        (Object.keys(groups).length !== 1 ? 's' : '') +
        '<br>¡Buena compra!';
    });
</script>
</body>
</html>
